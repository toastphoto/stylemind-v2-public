<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleMind Agent Workbench</title>
    <style>
        :root {
            --ink: #111827;
            --ink-2: #374151;
            --muted: #6b7280;
            --line: #d9e0ea;
            --line-strong: #bfcbda;
            --paper: #f5f7fb;
            --panel: #ffffff;
            --night: #0b1020;
            --blue: #1d4ed8;
            --blue-soft: #e7eefc;
            --green: #047857;
            --green-soft: #dff5ea;
            --amber: #b45309;
            --amber-soft: #fff3d6;
            --rose: #be123c;
            --rose-soft: #ffe4e6;
            --violet: #6d28d9;
            --violet-soft: #efe7ff;
            --radius: 8px;
            --shadow: 0 18px 50px rgba(15, 23, 42, 0.09);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            color: var(--ink);
            background: var(--paper);
            font-family: Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            letter-spacing: 0;
        }

        body {
            overflow: hidden;
        }

        button,
        input,
        textarea,
        select {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.48;
        }

        .app {
            height: 100vh;
            display: grid;
            grid-template-rows: 58px 1fr;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(260px, 1fr) auto minmax(360px, 1fr);
            align-items: center;
            gap: 18px;
            padding: 0 24px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(18px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--night);
            color: #fff;
            font-weight: 800;
            font-size: 15px;
        }

        .brand-title {
            min-width: 0;
        }

        .brand-title strong {
            display: block;
            font-size: 15px;
            line-height: 1.1;
        }

        .brand-title span {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mode-tabs {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f8fafc;
        }

        .mode-tab {
            min-width: 72px;
            height: 32px;
            border-radius: 6px;
            color: var(--muted);
            background: transparent;
            font-size: 13px;
            font-weight: 700;
        }

        .mode-tab.active {
            color: #fff;
            background: var(--night);
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        .select {
            height: 36px;
            min-width: 150px;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--ink);
            background: #fff;
            padding: 0 10px;
            outline: none;
        }

        .btn {
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border-radius: 8px;
            padding: 0 13px;
            font-weight: 800;
            font-size: 13px;
            color: var(--ink);
            background: #fff;
            border: 1px solid var(--line);
        }

        .btn.primary {
            color: #fff;
            background: var(--blue);
            border-color: var(--blue);
        }

        .btn.dark {
            color: #fff;
            background: var(--night);
            border-color: var(--night);
        }

        .btn.soft {
            color: var(--blue);
            background: var(--blue-soft);
            border-color: #bdd0fb;
        }

        .btn.green {
            color: var(--green);
            background: var(--green-soft);
            border-color: #b4e9cf;
        }

        .workspace {
            height: calc(100vh - 58px);
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            overflow: hidden;
        }

        .main {
            min-width: 0;
            height: 100%;
            overflow-y: auto;
            padding: 22px 22px 34px;
        }

        .main-inner {
            max-width: 1280px;
            margin: 0 auto;
        }

        .runway {
            display: grid;
            grid-template-columns: 1.1fr 1.6fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .upload-band,
        .agent-band {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            min-height: 144px;
        }

        .upload-band {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            padding: 18px;
        }

        .upload-copy {
            min-width: 0;
        }

        .upload-copy h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .upload-copy p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .dropzone {
            width: 174px;
            height: 104px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            border: 1px dashed var(--line-strong);
            color: var(--ink-2);
            background: #fbfdff;
            text-align: center;
            font-size: 13px;
            font-weight: 800;
            padding: 14px;
        }

        .dropzone.dragging {
            border-color: var(--blue);
            background: var(--blue-soft);
            color: var(--blue);
        }

        .agent-band {
            padding: 16px 16px 14px;
        }

        .band-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
        }

        .band-head h2 {
            margin: 0;
            font-size: 15px;
            line-height: 1.2;
        }

        .band-head p {
            margin: 5px 0 0;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .step-row {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 8px;
        }

        .step {
            min-height: 68px;
            padding: 9px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f9fbff;
        }

        .step b {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            line-height: 1.2;
        }

        .step span {
            display: inline-flex;
            align-items: center;
            min-height: 20px;
            border-radius: 999px;
            padding: 0 8px;
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            background: #eef2f7;
        }

        .step.done span {
            color: var(--green);
            background: var(--green-soft);
        }

        .step.running span {
            color: var(--blue);
            background: var(--blue-soft);
        }

        .step.warn span {
            color: var(--amber);
            background: var(--amber-soft);
        }

        .deck-toolbar {
            position: sticky;
            top: -22px;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            min-height: 56px;
            padding: 10px 0;
            background: rgba(245, 247, 251, 0.92);
            backdrop-filter: blur(16px);
        }

        .deck-title {
            min-width: 0;
        }

        .deck-title strong {
            display: block;
            font-size: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .deck-title span {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .stat {
            min-width: 84px;
            padding: 8px 10px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid var(--line);
        }

        .stat span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
        }

        .stat b {
            display: block;
            margin-top: 3px;
            font-size: 18px;
            line-height: 1;
        }

        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 14px;
        }

        .page-card {
            min-height: 252px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fff;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
            transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
        }

        .page-card:hover {
            transform: translateY(-2px);
            border-color: var(--line-strong);
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.1);
        }

        .page-card.active {
            border-color: var(--blue);
            box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.14), 0 18px 42px rgba(15, 23, 42, 0.1);
        }

        .thumb {
            aspect-ratio: 16 / 9;
            position: relative;
            background:
                linear-gradient(135deg, rgba(17, 24, 39, 0.05), rgba(29, 78, 216, 0.08)),
                #f8fafc;
            border-bottom: 1px solid var(--line);
            overflow: hidden;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .thumb-placeholder {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 800;
        }

        .thumb-index {
            position: absolute;
            top: 10px;
            left: 10px;
            min-width: 34px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            color: #fff;
            background: rgba(11, 16, 32, 0.78);
            font-size: 12px;
            font-weight: 900;
        }

        .page-body {
            padding: 12px;
        }

        .page-title-line {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .page-title-line h3 {
            margin: 0;
            min-height: 38px;
            font-size: 14px;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .quality-dot {
            flex: 0 0 auto;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            margin-top: 5px;
            background: var(--green);
        }

        .quality-dot.warn {
            background: var(--amber);
        }

        .quality-dot.empty {
            background: #cbd5e1;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            min-height: 22px;
            max-width: 100%;
            border-radius: 999px;
            padding: 0 8px;
            color: var(--ink-2);
            background: #eef2f7;
            font-size: 11px;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chip.blue {
            color: var(--blue);
            background: var(--blue-soft);
        }

        .chip.green {
            color: var(--green);
            background: var(--green-soft);
        }

        .chip.amber {
            color: var(--amber);
            background: var(--amber-soft);
        }

        .chip.violet {
            color: var(--violet);
            background: var(--violet-soft);
        }

        .empty-state {
            min-height: 360px;
            display: grid;
            place-items: center;
            border: 1px dashed var(--line-strong);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.62);
            text-align: center;
            color: var(--muted);
        }

        .empty-state strong {
            display: block;
            color: var(--ink);
            font-size: 18px;
            margin-bottom: 8px;
        }

        .inspector {
            height: 100%;
            overflow-y: auto;
            border-left: 1px solid var(--line);
            background: #fff;
        }

        .inspector-inner {
            min-height: 100%;
            display: grid;
            grid-template-rows: auto auto 1fr;
        }

        .inspector-head {
            position: sticky;
            top: 0;
            z-index: 8;
            padding: 18px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--line);
        }

        .inspector-head h2 {
            margin: 0;
            font-size: 16px;
            line-height: 1.25;
        }

        .inspector-head p {
            margin: 7px 0 0;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .status-line {
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-bottom: 1px solid var(--line);
            color: var(--ink-2);
            background: #f8fafc;
            font-size: 12px;
            line-height: 1.4;
        }

        .status-line strong {
            color: var(--ink);
        }

        .inspector-section {
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
        }

        .inspector-section h3 {
            margin: 0 0 12px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .field {
            display: grid;
            gap: 6px;
            margin-bottom: 12px;
        }

        .field:last-child {
            margin-bottom: 0;
        }

        .field label {
            color: var(--ink-2);
            font-size: 12px;
            font-weight: 800;
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--ink);
            background: #fff;
            outline: none;
        }

        .field input,
        .field select {
            height: 36px;
            padding: 0 10px;
        }

        .field textarea {
            min-height: 112px;
            resize: vertical;
            padding: 10px;
            line-height: 1.5;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .button-grid .btn {
            width: 100%;
        }

        .asset-strip {
            display: grid;
            gap: 8px;
        }

        .asset-row {
            display: grid;
            grid-template-columns: 54px 1fr;
            gap: 10px;
            align-items: center;
            min-height: 54px;
        }

        .asset-row img {
            width: 54px;
            height: 38px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: #f1f5f9;
        }

        .asset-row span {
            min-width: 0;
            color: var(--muted);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .manifest-stack {
            display: grid;
            gap: 10px;
        }

        .manifest-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfdff;
            padding: 10px;
        }

        .manifest-card b {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .manifest-list {
            display: grid;
            gap: 6px;
        }

        .manifest-item {
            display: grid;
            grid-template-columns: minmax(70px, 0.72fr) minmax(0, 1fr);
            gap: 8px;
            align-items: start;
            font-size: 11px;
            line-height: 1.45;
        }

        .manifest-item strong {
            color: var(--ink-2);
            font-weight: 800;
            word-break: keep-all;
        }

        .manifest-item span {
            min-width: 0;
            color: var(--muted);
            overflow-wrap: anywhere;
        }

        .policy-flags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .timeline {
            display: grid;
            gap: 8px;
            max-height: 230px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .log {
            display: grid;
            grid-template-columns: 8px 1fr;
            gap: 9px;
            align-items: start;
            font-size: 12px;
            line-height: 1.45;
        }

        .log::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 5px;
            background: #cbd5e1;
        }

        .log.done::before {
            background: var(--green);
        }

        .log.running::before {
            background: var(--blue);
        }

        .log.warn::before {
            background: var(--amber);
        }

        .log.error::before {
            background: var(--rose);
        }

        .log b {
            display: block;
        }

        .log span {
            display: block;
            color: var(--muted);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1180px) {
            body {
                overflow: auto;
            }

            .app,
            .workspace {
                height: auto;
                min-height: 100vh;
            }

            .app {
                grid-template-rows: auto 1fr;
            }

            .topbar {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                height: auto;
                padding: 12px;
            }

            .top-actions {
                justify-content: flex-start;
                flex-wrap: wrap;
            }

            .workspace {
                grid-template-columns: 1fr;
            }

            .runway {
                grid-template-columns: 1fr;
            }

            .inspector {
                height: auto;
                border-left: 0;
                border-top: 1px solid var(--line);
            }

            .inspector-head {
                position: static;
            }
        }

        @media (max-width: 680px) {
            .main {
                padding: 14px 12px 24px;
            }

            .upload-band {
                grid-template-columns: 1fr;
            }

            .dropzone {
                width: 100%;
            }

            .step-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .deck-toolbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .stats {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">S</div>
                <div class="brand-title">
                    <strong>StyleMind</strong>
                    <span id="sessionLabel">Agent Workbench</span>
                </div>
            </div>
            <div class="mode-tabs" aria-label="工作区">
                <button class="mode-tab active" type="button">工作台</button>
                <button class="mode-tab" type="button" onclick="location.href='/upload'">旧版</button>
            </div>
            <div class="top-actions">
                <button class="btn green" id="deckAssetsBtn" type="button">批量补背景</button>
                <button class="btn soft" id="previewBtn" type="button">HTML 预览</button>
                <button class="btn dark" id="exportBtn" type="button">转写 PPTX</button>
            </div>
        </header>

        <main class="workspace">
            <section class="main">
                <div class="main-inner">
                    <section class="runway">
                        <div class="upload-band">
                            <div class="upload-copy">
                                <h1 id="deckHeadline">把大纲变成可控的方案工作台</h1>
                                <p id="deckSubline">上传 DOCX / Markdown / JSON 后，Agent 会生成页面角色、视觉原型、素材缺口和导出路线。</p>
                            </div>
                            <label class="dropzone" id="dropzone">
                                <input class="hidden" id="outlineFile" type="file" accept=".docx,.md,.markdown,.json,.txt,application/json">
                                <span>上传大纲</span>
                            </label>
                        </div>

                        <div class="agent-band">
                            <div class="band-head">
                                <div>
                                    <h2>Agent Runway</h2>
                                    <p>所有动作围绕 HTML 工作台、DeckPlan 和同源 PPTX 转写，不让预览和交付各跑各的。</p>
                                </div>
                                <button class="btn" id="qaBtn" type="button">检查</button>
                            </div>
                            <div class="step-row" id="stepRow"></div>
                        </div>
                    </section>

                    <section class="deck-toolbar">
                        <div class="deck-title">
                            <strong id="deckTitle">未载入大纲</strong>
                            <span id="deckMeta">等待上传</span>
                        </div>
                        <div class="stats">
                            <div class="stat"><span>页面</span><b id="statPages">0</b></div>
                            <div class="stat"><span>需补图</span><b id="statNeeds">0</b></div>
                            <div class="stat"><span>预览</span><b id="statPreviews">0</b></div>
                            <div class="stat"><span>转写页</span><b id="statTemplate">0</b></div>
                        </div>
                    </section>

                    <section id="pageGrid" class="page-grid"></section>
                </div>
            </section>

            <aside class="inspector">
                <div class="inspector-inner">
                    <div class="inspector-head">
                        <h2 id="inspectorTitle">页面 Inspector</h2>
                        <p id="inspectorMeta">选择页面后编辑文本、角色、资产和 PPTX 转写策略。</p>
                    </div>
                    <div class="status-line" id="statusLine"><strong>Ready</strong><span>等待上传大纲</span></div>
                    <div id="inspectorBody"></div>
                </div>
            </aside>
        </main>
    </div>

    <input class="hidden" id="materialInput" type="file" accept="image/*">
    <input class="hidden" id="backgroundInput" type="file" accept="image/*">

    <script>
        const PAGE_ROLES = ['开场定调', '章节转场', '内容承接', '创意主张', '执行打法', '案例证据', '数据结果', '视频素材'];
        const DEFAULT_PPTX_STRATEGY = 'reference-template';
        const ARCHETYPE_LABELS = {
            hero_photo_claim: '开场主视觉',
            section_divider: '章节转场',
            editorial_content_bridge: '内容承接',
            strategy_claim_collage: '创意主张',
            step_flow: '执行步骤',
            campaign_timeline: '传播节奏',
            evidence_wall: '案例证据',
            metric_dashboard: '数据结果',
            video_material_board: '视频素材',
            pending: '待生成'
        };
        const ACTION_LABELS = {
            match_reference_template: '参考模板匹配',
            borrow_dashiai_component_seed: '组件结构借鉴',
            generate_or_upload_page_asset: '素材补齐',
            render_html_preview: 'HTML 预览',
            transcribe_editable_pptx: '转写 PPTX',
            qa_native_objects: '对象检查'
        };
        const POLICY_LABELS = {
            preserve_outline_parser: '保留大纲拆分',
            feibo_reference_first: '飞博参考优先',
            html_preview_then_editable_pptx: 'HTML 预览后转写 PPTX',
            no_full_slide_png_delivery: '不交付整页 PNG'
        };
        const STEPS = [
            ['upload', '读取大纲'],
            ['plan', '页面规划'],
            ['template', '模板匹配'],
            ['asset', '资产补齐'],
            ['preview', 'HTML 预览'],
            ['export', 'PPT 转写']
        ];

        const state = {
            sessionId: '',
            outline: null,
            deckPlan: null,
            previews: new Map(),
            selectedIndex: 0,
            logs: [],
            busy: false,
            stepState: {},
            lastExport: null
        };

        const el = {
            sessionLabel: document.getElementById('sessionLabel'),
            outlineFile: document.getElementById('outlineFile'),
            dropzone: document.getElementById('dropzone'),
            stepRow: document.getElementById('stepRow'),
            pageGrid: document.getElementById('pageGrid'),
            deckTitle: document.getElementById('deckTitle'),
            deckMeta: document.getElementById('deckMeta'),
            deckHeadline: document.getElementById('deckHeadline'),
            deckSubline: document.getElementById('deckSubline'),
            statPages: document.getElementById('statPages'),
            statNeeds: document.getElementById('statNeeds'),
            statPreviews: document.getElementById('statPreviews'),
            statTemplate: document.getElementById('statTemplate'),
            inspectorTitle: document.getElementById('inspectorTitle'),
            inspectorMeta: document.getElementById('inspectorMeta'),
            inspectorBody: document.getElementById('inspectorBody'),
            statusLine: document.getElementById('statusLine'),
            previewBtn: document.getElementById('previewBtn'),
            exportBtn: document.getElementById('exportBtn'),
            deckAssetsBtn: document.getElementById('deckAssetsBtn'),
            qaBtn: document.getElementById('qaBtn'),
            materialInput: document.getElementById('materialInput'),
            backgroundInput: document.getElementById('backgroundInput')
        };

        function setStatus(title, detail, tone = 'ready') {
            el.statusLine.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(detail || '')}</span>`;
            el.statusLine.style.borderLeft = tone === 'error' ? '4px solid var(--rose)' : tone === 'warn' ? '4px solid var(--amber)' : tone === 'success' ? '4px solid var(--green)' : '0';
        }

        function log(label, detail, tone = 'done') {
            state.logs.unshift({ label, detail, tone, time: new Date().toLocaleTimeString('zh-CN', { hour12: false }) });
            state.logs = state.logs.slice(0, 16);
            renderInspector();
        }

        function setStep(key, tone, label) {
            state.stepState[key] = { tone, label };
            renderSteps();
        }

        function renderSteps() {
            el.stepRow.innerHTML = STEPS.map(([key, title]) => {
                const step = state.stepState[key] || { tone: '', label: '等待' };
                return `<div class="step ${step.tone || ''}"><b>${title}</b><span>${escapeHtml(step.label || '等待')}</span></div>`;
            }).join('');
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[ch]));
        }

        function truncate(value, length = 56) {
            const text = String(value || '').replace(/\s+/g, ' ').trim();
            return text.length > length ? text.slice(0, length - 1) + '…' : text;
        }

        function archetypeLabel(value) {
            return ARCHETYPE_LABELS[value] || value || '待生成';
        }

        function actionLabel(value) {
            return ACTION_LABELS[value] || value || '动作';
        }

        function policyLabel(value) {
            return POLICY_LABELS[value] || value || '边界';
        }

        function pages() {
            return state.outline && Array.isArray(state.outline.pages) ? state.outline.pages : [];
        }

        function selectedPage() {
            return pages()[state.selectedIndex] || null;
        }

        function planPage(index = state.selectedIndex) {
            const planPages = state.deckPlan && Array.isArray(state.deckPlan.pages) ? state.deckPlan.pages : [];
            return planPages[index] || null;
        }

        function assetList(page, key) {
            const value = page && page[key];
            if (!value) return [];
            return Array.isArray(value) ? value.filter(Boolean) : [value];
        }

        function backgroundList(page) {
            return assetList(page, 'background_images').concat(assetList(page, 'background_image'));
        }

        function previewFor(index) {
            return state.previews.get(index);
        }

        function needsCount() {
            if (!state.deckPlan || !Array.isArray(state.deckPlan.pages)) return 0;
            return state.deckPlan.pages.filter(page => Array.isArray(page.needs) && page.needs.length).length;
        }

        function templateRouteCount() {
            if (!state.deckPlan || !Array.isArray(state.deckPlan.pages)) return 0;
            return state.deckPlan.pages.filter(page => page.export_route).length;
        }

        function renderShell() {
            const count = pages().length;
            const title = state.outline ? (state.outline.title || 'PPT大纲') : '未载入大纲';
            el.deckTitle.textContent = title;
            el.deckHeadline.textContent = state.outline ? title : '把大纲变成可控的方案工作台';
            el.deckSubline.textContent = state.outline ? '工作台会围绕页面角色、模板、资产和导出链路持续更新。' : '上传 DOCX / Markdown / JSON 后，Agent 会生成页面角色、视觉原型、素材缺口和导出路线。';
            el.deckMeta.textContent = state.outline ? `${count} 页 · ${state.sessionId || '本地 outline'}` : '等待上传';
            el.sessionLabel.textContent = state.sessionId ? `Session ${state.sessionId.slice(0, 8)}` : 'Agent Workbench';
            el.statPages.textContent = count;
            el.statNeeds.textContent = needsCount();
            el.statPreviews.textContent = state.previews.size;
            el.statTemplate.textContent = templateRouteCount();
            el.previewBtn.disabled = !count || state.busy;
            el.exportBtn.disabled = !count || state.busy;
            el.deckAssetsBtn.disabled = !count || state.busy;
            el.qaBtn.disabled = !count || state.busy;
            renderSteps();
            renderPages();
            renderInspector();
        }

        function renderPages() {
            const list = pages();
            if (!list.length) {
                el.pageGrid.innerHTML = `<div class="empty-state"><div><strong>等待大纲</strong><span>上传文件后，页面会以工作台视图展开。</span></div></div>`;
                return;
            }
            el.pageGrid.innerHTML = list.map((page, index) => {
                const plan = planPage(index);
                const preview = previewFor(index);
                const mats = assetList(page, 'fixed_images').length;
                const bgs = backgroundList(page).length;
                const needs = plan && Array.isArray(plan.needs) ? plan.needs : [];
                const role = plan ? plan.page_role : (page.layout_skill || page.type || '待分类');
                const archetype = plan ? archetypeLabel(plan.visual_archetype) : '待生成';
                const exportRoute = plan ? (plan.export_route || 'HTML工作台转写PPTX') : 'pending';
                const dot = !plan ? 'empty' : needs.length ? 'warn' : '';
                return `
                    <article class="page-card ${index === state.selectedIndex ? 'active' : ''}" data-page-index="${index}">
                        <div class="thumb">
                            ${preview ? `<img src="${preview}" alt="第 ${index + 1} 页预览">` : `<div class="thumb-placeholder">RenderPlan Preview</div>`}
                            <span class="thumb-index">P${String(index + 1).padStart(2, '0')}</span>
                        </div>
                        <div class="page-body">
                            <div class="page-title-line">
                                <h3>${escapeHtml(page.title || `第 ${index + 1} 页`)}</h3>
                                <span class="quality-dot ${dot}"></span>
                            </div>
                            <div class="chips">
                                <span class="chip blue">${escapeHtml(role)}</span>
                                <span class="chip violet">${escapeHtml(archetype)}</span>
                                <span class="chip green">${escapeHtml(exportRoute)}</span>
                                <span class="chip ${mats || bgs ? 'green' : 'amber'}">素材 ${mats} / 背景 ${bgs}</span>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function renderInspector() {
            const page = selectedPage();
            if (!page) {
                el.inspectorTitle.textContent = '页面 Inspector';
                el.inspectorMeta.textContent = '选择页面后编辑文本、角色、资产和导出策略。';
                el.inspectorBody.innerHTML = renderLogs();
                return;
            }
            const plan = planPage();
            const mats = assetList(page, 'fixed_images');
            const bgs = backgroundList(page);
            el.inspectorTitle.textContent = `P${String(state.selectedIndex + 1).padStart(2, '0')} · ${page.title || '未命名页面'}`;
            el.inspectorMeta.textContent = plan ? `${plan.page_role} · ${archetypeLabel(plan.visual_archetype)} · ${plan.export_route || 'HTML工作台转写PPTX'}` : '等待 Agent 规划';
            el.inspectorBody.innerHTML = `
                <section class="inspector-section">
                    <h3>页面控制</h3>
                    <div class="field">
                        <label for="pageTitleInput">标题</label>
                        <input id="pageTitleInput" value="${escapeHtml(page.title || '')}">
                    </div>
                    <div class="field">
                        <label for="pageRoleSelect">页面 Skill</label>
                        <select id="pageRoleSelect">
                            ${PAGE_ROLES.map(role => `<option value="${role}" ${role === (plan ? plan.page_role : page.layout_skill) ? 'selected' : ''}>${role}</option>`).join('')}
                        </select>
                    </div>
                    <div class="field">
                        <label for="pageBriefInput">Brief</label>
                        <textarea id="pageBriefInput">${escapeHtml(page.brief || '')}</textarea>
                    </div>
                    <div class="field">
                        <label for="pageContentInput">正文</label>
                        <textarea id="pageContentInput">${escapeHtml(page.content || '')}</textarea>
                    </div>
                    <div class="button-grid">
                        <button class="btn soft" type="button" id="savePageBtn">保存页面</button>
                        <button class="btn" type="button" id="replanPageBtn">重算规划</button>
                    </div>
                </section>

                <section class="inspector-section">
                    <h3>资产槽</h3>
                    <div class="button-grid">
                        <button class="btn" type="button" id="uploadMaterialBtn">上传素材</button>
                        <button class="btn" type="button" id="uploadBackgroundBtn">上传背景</button>
                        <button class="btn green" type="button" id="generateMaterialBtn">生成素材</button>
                        <button class="btn green" type="button" id="generateBackgroundBtn">生成背景</button>
                    </div>
                    <div class="asset-strip" style="margin-top:12px;">
                        ${renderAssetRows('素材', mats)}
                        ${renderAssetRows('背景', bgs)}
                    </div>
                </section>

                <section class="inspector-section">
                    <h3>当前判断</h3>
                    <div class="chips">
                        <span class="chip blue">${escapeHtml(plan ? plan.page_role : '待分类')}</span>
                        <span class="chip violet">${escapeHtml(plan ? archetypeLabel(plan.visual_archetype) : '待生成')}</span>
                        <span class="chip ${plan && plan.needs && plan.needs.length ? 'amber' : 'green'}">${plan && plan.needs && plan.needs.length ? '需处理' : '可预览'}</span>
                    </div>
                    <div class="button-grid" style="margin-top:12px;">
                        <button class="btn soft" type="button" id="previewOneBtn">生成 HTML 预览</button>
                        <button class="btn dark" type="button" id="exportSideBtn">转写 PPTX</button>
                    </div>
                </section>

                ${renderManifest(plan)}

                <section class="inspector-section">
                    <h3>Agent 活动</h3>
                    ${renderLogs()}
                </section>
            `;
            bindInspectorEvents();
        }

        function renderAssetRows(label, assets) {
            if (!assets.length) {
                return `<div class="asset-row"><img alt="" src=""><span>${label}：暂无</span></div>`;
            }
            return assets.map((src, idx) => `
                <div class="asset-row">
                    <img src="${escapeHtml(src)}" alt="${escapeHtml(label)} ${idx + 1}">
                    <span>${escapeHtml(label)} ${idx + 1} · ${escapeHtml(src)}</span>
                </div>
            `).join('');
        }

        function renderManifest(plan) {
            const manifest = plan && plan.control_manifest;
            if (!manifest) {
                return `
                    <section class="inspector-section">
                        <h3>Page Manifest</h3>
                        <div class="manifest-card">
                            <b>等待规划</b>
                            <div class="manifest-item"><strong>状态</strong><span>生成 DeckPlan 后展示可控字段、素材槽和 Agent 动作。</span></div>
                        </div>
                    </section>
                `;
            }
            const controls = Array.isArray(manifest.safe_controls) ? manifest.safe_controls : [];
            const slots = Array.isArray(manifest.media_slots) ? manifest.media_slots : [];
            const actions = Array.isArray(manifest.agent_actions) ? manifest.agent_actions : [];
            const flags = Array.isArray(manifest.policy_flags) ? manifest.policy_flags : [];
            const seeds = Array.isArray(manifest.dashiai_theme_seeds) ? manifest.dashiai_theme_seeds : [];
            const restyle = manifest.feibo_restyle || (seeds[0] && seeds[0].feibo_restyle) || null;
            const targetTokens = restyle && restyle.target_tokens ? restyle.target_tokens : {};
            const blocked = restyle && Array.isArray(restyle.blocked_defaults) ? restyle.blocked_defaults : [];
            const selectedSeedKey = manifest.selected_dashiai_seed_key || '';
            const seedRejected = Boolean(manifest.dashiai_seed_rejected);
            return `
                <section class="inspector-section">
                    <h3>Page Manifest</h3>
                    <div class="manifest-stack">
                        <div class="manifest-card">
                            <b>飞博审美覆盖</b>
                            ${restyle ? `
                                <div class="manifest-list">
                                    <div class="manifest-item"><strong>目标</strong><span>${escapeHtml(restyle.target_style_label || 'Feibo reference')}</span></div>
                                    <div class="manifest-item"><strong>版式</strong><span>${escapeHtml(archetypeLabel(restyle.visual_archetype))} · ${escapeHtml(restyle.composition || '')}</span></div>
                                    <div class="manifest-item"><strong>色彩</strong><span>${escapeHtml(targetTokens.paper || '')} / ${escapeHtml(targetTokens.accent || '')} / ${escapeHtml(targetTokens.soft || '')}</span></div>
                                    <div class="manifest-item"><strong>图片</strong><span>${escapeHtml(targetTokens.photo_treatment || 'replaceable picture objects')}</span></div>
                                </div>
                            ` : '<div class="manifest-item"><strong>状态</strong><span>优先使用飞博参考模板。</span></div>'}
                        </div>
                        <div class="manifest-card">
                            <b>安全控制项</b>
                            <div class="manifest-list">
                                ${controls.map(item => `
                                    <div class="manifest-item">
                                        <strong>${escapeHtml(item.label || item.key)}</strong>
                                        <span>${escapeHtml(item.type || 'control')} · ${escapeHtml(item.scope || 'page')}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="manifest-card">
                            <b>素材槽</b>
                            <div class="manifest-list">
                                ${slots.map(item => `
                                    <div class="manifest-item">
                                        <strong>${escapeHtml(item.label || item.key)}</strong>
                                        <span>${escapeHtml(item.kind || 'asset')} · ${Number(item.count || 0)} 个 · ${escapeHtml(item.source || 'manual')}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="manifest-card">
                            <b>Agent 下一步</b>
                            <div class="policy-flags">
                                ${actions.map(action => `<span class="chip">${escapeHtml(actionLabel(action))}</span>`).join('')}
                            </div>
                        </div>
                        <div class="manifest-card">
                            <b>DashiAI 组件种子</b>
                            <div class="field">
                                <label for="seedSelect">页面组件选择</label>
                                <select id="seedSelect">
                                    <option value="" ${!selectedSeedKey && !seedRejected ? 'selected' : ''}>飞博模板优先</option>
                                    ${seeds.map(seed => `<option value="${escapeHtml(seed.key)}" ${seed.key === selectedSeedKey ? 'selected' : ''}>${escapeHtml(seed.label || seed.key)} · ${escapeHtml(seed.theme || '')}</option>`).join('')}
                                    <option value="__feibo_only" ${seedRejected ? 'selected' : ''}>拒绝 DashiAI seed</option>
                                </select>
                            </div>
                            <div class="manifest-list">
                                ${seeds.length ? seeds.map(seed => `
                                    <div class="manifest-item">
                                        <strong>${escapeHtml(seed.label || seed.key)}</strong>
                                        <span>${escapeHtml(seed.theme || '')} · ${escapeHtml((seed.module_tags || []).join(' / ') || 'module')} · ${escapeHtml(seed.feibo_restyle ? seed.feibo_restyle.status : '飞博化待改写')}</span>
                                    </div>
                                `).join('') : '<div class="manifest-item"><strong>无候选</strong><span>优先使用飞博参考模板。</span></div>'}
                            </div>
                        </div>
                        <div class="manifest-card">
                            <b>禁止继承</b>
                            <div class="policy-flags">
                                ${(blocked.length ? blocked : ['keep_original_dashiai_palette_as_final']).map(flag => `<span class="chip amber">${escapeHtml(flag)}</span>`).join('')}
                            </div>
                        </div>
                        <div class="manifest-card">
                            <b>边界</b>
                            <div class="policy-flags">
                                ${flags.map(flag => `<span class="chip green">${escapeHtml(policyLabel(flag))}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderLogs() {
            if (!state.logs.length) {
                return `<div class="timeline"><div class="log"><div><b>等待动作</b><span>上传大纲后开始记录。</span></div></div></div>`;
            }
            return `<div class="timeline">${state.logs.map(item => `
                <div class="log ${item.tone}">
                    <div><b>${escapeHtml(item.label)}</b><span>${escapeHtml(item.time)} · ${escapeHtml(item.detail || '')}</span></div>
                </div>
            `).join('')}</div>`;
        }

        function bindInspectorEvents() {
            document.getElementById('savePageBtn')?.addEventListener('click', saveSelectedPage);
            document.getElementById('replanPageBtn')?.addEventListener('click', buildDeckPlan);
            document.getElementById('uploadMaterialBtn')?.addEventListener('click', () => el.materialInput.click());
            document.getElementById('uploadBackgroundBtn')?.addEventListener('click', () => el.backgroundInput.click());
            document.getElementById('generateMaterialBtn')?.addEventListener('click', () => generatePageAsset('image'));
            document.getElementById('generateBackgroundBtn')?.addEventListener('click', () => generatePageAsset('background'));
            document.getElementById('previewOneBtn')?.addEventListener('click', renderPreview);
            document.getElementById('exportSideBtn')?.addEventListener('click', exportPptx);
            document.getElementById('seedSelect')?.addEventListener('change', saveSeedChoice);
        }

        function saveSelectedPage() {
            const page = selectedPage();
            if (!page) return;
            page.title = document.getElementById('pageTitleInput')?.value || page.title;
            page.layout_skill = document.getElementById('pageRoleSelect')?.value || page.layout_skill;
            page.page_role = page.layout_skill;
            page.brief = document.getElementById('pageBriefInput')?.value || '';
            page.content = document.getElementById('pageContentInput')?.value || '';
            saveOutlineSession();
            log('页面已保存', `P${state.selectedIndex + 1} · ${page.layout_skill}`, 'done');
            buildDeckPlan();
        }

        async function saveOutlineSession() {
            if (!state.sessionId || !state.outline) return;
            try {
                await fetch('/api/update-outline-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: state.sessionId, outline: state.outline })
                });
            } catch (error) {
                log('保存失败', error.message, 'warn');
            }
        }

        async function saveSeedChoice(event) {
            const page = selectedPage();
            const plan = planPage();
            if (!page) return;
            const value = event.target.value || '';
            const seeds = plan && plan.control_manifest && Array.isArray(plan.control_manifest.dashiai_theme_seeds)
                ? plan.control_manifest.dashiai_theme_seeds
                : [];
            if (value === '__feibo_only') {
                page.dashiai_seed_rejected = true;
                delete page.dashiai_seed_key;
                delete page.dashiai_seed_label;
                delete page.dashiai_seed_snapshot;
                log('组件种子已拒绝', `P${state.selectedIndex + 1} · 飞博模板优先`, 'warn');
            } else if (value) {
                const seed = seeds.find(item => item.key === value) || { key: value, label: value };
                page.dashiai_seed_rejected = false;
                page.dashiai_seed_key = seed.key;
                page.dashiai_seed_label = seed.label || seed.key;
                page.dashiai_seed_snapshot = seed;
                log('组件种子已选择', `P${state.selectedIndex + 1} · ${page.dashiai_seed_label}`, 'done');
            } else {
                page.dashiai_seed_rejected = false;
                delete page.dashiai_seed_key;
                delete page.dashiai_seed_label;
                delete page.dashiai_seed_snapshot;
                log('组件种子已清空', `P${state.selectedIndex + 1} · 飞博模板优先`, 'done');
            }
            await saveOutlineSession();
            await buildDeckPlan();
        }

        async function uploadOutlineFile(file) {
            if (!file) return;
            state.busy = true;
            setStep('upload', 'running', '读取中');
            setStatus('Uploading', file.name);
            renderShell();
            try {
                const form = new FormData();
                form.append('file', file);
                const response = await fetch('/api/upload-outline', { method: 'POST', body: form });
                const result = await response.json();
                if (!response.ok || result.status !== 'success') throw new Error(result.message || '上传解析失败');
                state.sessionId = result.session_id;
                state.outline = result.outline;
                state.selectedIndex = 0;
                state.previews.clear();
                setStep('upload', 'done', `${result.page_count} 页`);
                log('大纲已载入', result.message, 'done');
                setStatus('Loaded', result.message, 'success');
                await buildDeckPlan();
            } catch (error) {
                setStep('upload', 'warn', '失败');
                setStatus('Error', error.message, 'error');
                log('上传失败', error.message, 'error');
            } finally {
                state.busy = false;
                renderShell();
            }
        }

        async function buildDeckPlan() {
            if (!state.outline) return;
            state.busy = true;
            setStep('plan', 'running', '计算中');
            renderShell();
            try {
                const result = await postJson('/api/agent/run', {
                    action: 'build_deck_plan',
                    session_id: state.sessionId,
                    outline: state.outline
                });
                state.deckPlan = result.deck_plan;
                setStep('plan', 'done', `${state.deckPlan.page_count} 页`);
                setStep('template', 'done', `${templateRouteCount()} 页`);
                const missing = needsCount();
                setStep('asset', missing ? 'warn' : 'done', missing ? `${missing} 页` : '就绪');
                log('Agent 规划完成', `${state.deckPlan.page_count} 页 · ${missing} 页需处理`, missing ? 'warn' : 'done');
                setStatus('Planned', 'DeckPlan 已生成', 'success');
            } catch (error) {
                setStep('plan', 'warn', '失败');
                setStatus('Error', error.message, 'error');
                log('规划失败', error.message, 'error');
            } finally {
                state.busy = false;
                renderShell();
            }
        }

        async function runQa() {
            if (!state.outline) return;
            state.busy = true;
            setStatus('QA', '检查页面资产和导出策略');
            renderShell();
            try {
                const result = await postJson('/api/agent/run', {
                    action: 'qa_deck',
                    session_id: state.sessionId,
                    outline: state.outline
                });
                state.deckPlan = result.deck_plan;
                const count = result.qa.needs_attention_count;
                log('QA 完成', `${count} 页需要补充资产或复核`, count ? 'warn' : 'done');
                setStatus('QA Done', result.message, count ? 'warn' : 'success');
            } catch (error) {
                setStatus('Error', error.message, 'error');
                log('QA 失败', error.message, 'error');
            } finally {
                state.busy = false;
                renderShell();
            }
        }

        async function renderPreview() {
            if (!state.outline) return;
            state.busy = true;
            setStep('preview', 'running', '生成中');
            setStatus('Preview', '生成 HTML 工作台预览');
            renderShell();
            try {
                const result = await postJson('/api/render-plan-preview', {
                    session_id: state.sessionId,
                    outline: state.outline
                });
                state.previews.clear();
                (result.previews || []).forEach(item => state.previews.set(item.page_index, item.image));
                setStep('preview', 'done', `${state.previews.size} 页`);
                log('HTML 预览完成', `${state.previews.size} 页 · ${result.pipeline}`, 'done');
                setStatus('Preview Done', result.message, 'success');
            } catch (error) {
                setStep('preview', 'warn', '失败');
                setStatus('Error', error.message, 'error');
                log('预览失败', error.message, 'error');
            } finally {
                state.busy = false;
                renderShell();
            }
        }

        async function uploadPageAsset(file, assetRole) {
            if (!file || !state.outline) return;
            const page = selectedPage();
            if (!page) return;
            state.busy = true;
            setStatus('Asset', `${assetRole === 'background' ? '上传背景' : '上传素材'} · P${state.selectedIndex + 1}`);
            renderShell();
            try {
                const form = new FormData();
                form.append('file', file);
                form.append('session_id', state.sessionId);
                form.append('page_index', String(state.selectedIndex));
                form.append('asset_role', assetRole);
                const response = await fetch('/api/upload-page-asset', { method: 'POST', body: form });
                const result = await response.json();
                if (!response.ok || result.status !== 'success') throw new Error(result.message || '上传失败');
                if (assetRole === 'background') {
                    page.background_images = result.updated_backgrounds || backgroundList(page).concat([result.asset_url]);
                } else {
                    page.fixed_images = result.updated_assets || assetList(page, 'fixed_images').concat([result.asset_url]);
                }
                log('资产已上传', result.message, 'done');
                setStatus('Asset Done', result.message, 'success');
                await buildDeckPlan();
            } catch (error) {
                setStatus('Error', error.message, 'error');
                log('资产上传失败', error.message, 'error');
            } finally {
                state.busy = false;
                renderShell();
            }
        }

        async function generatePageAsset(assetRole) {
            if (!state.outline) return;
            const page = selectedPage();
            if (!page) return;
            state.busy = true;
            setStatus('Asset', `${assetRole === 'background' ? '生成背景' : '生成素材'} · P${state.selectedIndex + 1}`);
            renderShell();
            try {
                const result = await postJson('/api/generate-page-asset', {
                    session_id: state.sessionId,
                    outline: state.outline,
                    page_index: state.selectedIndex,
                    asset_role: assetRole
                });
                if (assetRole === 'background') {
                    page.background_images = result.updated_backgrounds || backgroundList(page).concat([result.asset_url]);
                } else {
                    page.fixed_images = result.updated_assets || assetList(page, 'fixed_images').concat([result.asset_url]);
                }
                log('AI 资产已生成', `${result.message} · ${result.provider}`, 'done');
                setStatus('Asset Done', result.message, 'success');
                await buildDeckPlan();
            } catch (error) {
                setStatus('Error', error.message, 'error');
                log('资产生成失败', error.message, 'error');
            } finally {
                state.busy = false;
                renderShell();
            }
        }

        async function generateDeckBackgrounds() {
            if (!state.outline) return;
            state.busy = true;
            setStep('asset', 'running', '补图中');
            setStatus('Assets', '批量补背景图');
            renderShell();
            try {
                const result = await postJson('/api/generate-deck-assets', {
                    session_id: state.sessionId,
                    outline: state.outline,
                    asset_role: 'background',
                    missing_only: true,
                    max_pages: 12
                });
                (result.generated || []).forEach(item => {
                    const page = pages()[item.page_index];
                    if (page) page.background_images = item.updated_backgrounds || backgroundList(page).concat([item.asset_url]);
                });
                setStep('asset', 'done', `${result.generated_count} 页`);
                log('批量背景完成', `${result.generated_count} 生成 · ${result.skipped_count} 跳过`, 'done');
                await buildDeckPlan();
            } catch (error) {
                setStep('asset', 'warn', '失败');
                setStatus('Error', error.message, 'error');
                log('批量补图失败', error.message, 'error');
            } finally {
                state.busy = false;
                renderShell();
            }
        }

        async function exportPptx() {
            if (!state.outline) return;
            state.busy = true;
            setStep('export', 'running', '导出中');
            setStatus('Export', 'HTML 工作台转写为可编辑 PPTX');
            renderShell();
            try {
                const payload = {
                    session_id: state.sessionId,
                    outline: state.outline,
                    renderer: DEFAULT_PPTX_STRATEGY
                };
                payload.template_max_pages = pages().length;
                const result = await postJson('/api/export-pptx-structured', payload);
                state.lastExport = result;
                setStep('export', 'done', `${result.pages || pages().length} 页`);
                const strategy = result.quality_strategy === 'reference_template_first' ? '参考质感优先' : 'HTML 同源转写';
                log('PPTX 已转写', `${result.filename} · ${strategy}`, 'done');
                setStatus('Export Done', result.message, 'success');
                const a = document.createElement('a');
                a.href = result.download_url;
                a.download = result.filename || 'StyleMind.pptx';
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (error) {
                setStep('export', 'warn', '失败');
                setStatus('Error', error.message, 'error');
                log('导出失败', error.message, 'error');
            } finally {
                state.busy = false;
                renderShell();
            }
        }

        async function postJson(url, payload) {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (!response.ok || result.status !== 'success') {
                throw new Error(result.message || `${url} failed`);
            }
            return result;
        }

        el.dropzone.addEventListener('click', () => el.outlineFile.click());
        el.outlineFile.addEventListener('change', event => uploadOutlineFile(event.target.files[0]));
        el.dropzone.addEventListener('dragover', event => {
            event.preventDefault();
            el.dropzone.classList.add('dragging');
        });
        el.dropzone.addEventListener('dragleave', () => el.dropzone.classList.remove('dragging'));
        el.dropzone.addEventListener('drop', event => {
            event.preventDefault();
            el.dropzone.classList.remove('dragging');
            uploadOutlineFile(event.dataTransfer.files[0]);
        });
        el.pageGrid.addEventListener('click', event => {
            const card = event.target.closest('.page-card');
            if (!card) return;
            state.selectedIndex = Number(card.dataset.pageIndex || 0);
            renderShell();
        });
        el.previewBtn.addEventListener('click', renderPreview);
        el.exportBtn.addEventListener('click', exportPptx);
        el.deckAssetsBtn.addEventListener('click', generateDeckBackgrounds);
        el.qaBtn.addEventListener('click', runQa);
        el.materialInput.addEventListener('change', event => uploadPageAsset(event.target.files[0], 'image'));
        el.backgroundInput.addEventListener('change', event => uploadPageAsset(event.target.files[0], 'background'));

        renderShell();
        log('工作台已就绪', 'HTML Agent shell loaded', 'done');
    </script>
</body>
</html>
